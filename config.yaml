# ═══════════════════════════════════════════════════════════════
# mihomo config by chm0d777
# Лучшее от legiz + devuan + свои правила
# GitHub: https://github.com/chm0d777/mihomo-config
# ═══════════════════════════════════════════════════════════════

mode: rule
log-level: info
mixed-port: 7890
allow-lan: false
tcp-concurrent: true
enable-process: true
find-process-mode: always
ipv6: false
unified-delay: false
keep-alive-interval: 30

# LightGBM Smart балансировка (раскомментировать если ваша версия mihomo поддерживает type: smart)
#lgbm-auto-update: true
#lgbm-update-interval: 72
#lgbm-url: "https://github.com/vernesong/mihomo/releases/download/LightGBM-Model/Model-middle.bin"

profile:
  store-selected: true
  store-fake-ip: true

# TUN (из devuan)
tun:
  enable: true
  stack: gvisor
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53
    - tcp://any:53
  strict-route: true
  route-exclude-address:
    - 0.0.0.0/8
    - 8.8.8.8/32
    - 8.8.4.4/32
    - 1.1.1.1/32
    - 1.0.0.1/32
    - 77.88.8.8/32
    - 77.88.8.1/32
    - 94.140.14.14/32
    - 94.140.15.15/32
    - 10.0.0.0/8
    - 100.64.0.0/10
    - 127.0.0.0/8
    - 169.254.0.0/16
    - 172.16.0.0/12
    - 192.0.0.0/24
    - 192.0.2.0/24
    - 192.88.99.0/24
    - 192.168.0.0/16
    - 198.18.0.0/15
    - 198.51.100.0/24
    - 203.0.113.0/24
    - 224.0.0.0/3
    - ::/127
    - fc00::/7
    - fe80::/10
    - ff00::/8

# Сниффер
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: false
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
  skip-dst-address:
    - 0.0.0.0/8
    - 10.0.0.0/8
    - 100.64.0.0/10
    - 127.0.0.0/8
    - 169.254.0.0/16
    - 172.16.0.0/12
    - 192.0.0.0/24
    - 192.0.2.0/24
    - 192.88.99.0/24
    - 192.168.0.0/16
    - 198.18.0.0/15
    - 198.51.100.0/24
    - 203.0.113.0/24
    - 224.0.0.0/3
    - ::/127
    - fc00::/7
    - fe80::/10
    - ff00::/8

# DNS (fake-ip, как в старом конфиге для надежного матчинга доменов)
dns:
  enable: true
  prefer-h3: true
  use-hosts: true
  use-system-hosts: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.0/15
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "+.msftconnecttest.com"
    - "+.3gppnetwork"
    - "dns.google"
    - "one.one.one.one"
  default-nameserver:
    - 77.88.8.8
    - 77.88.8.1
    - 94.140.14.14
  nameserver:
    - https://94.140.14.14/dns-query
    - https://94.140.15.15/dns-query
    - https://doh.yandex.ru/dns-query
  nameserver-policy:
    "geosite:category-ru,yandex,mailru,drweb":
      - https://doh.yandex.ru/dns-query
      - 77.88.8.8
    "github.com,raw.githubusercontent.com,cdn.jsdelivr.net":
      - https://94.140.14.14/dns-query
      - https://94.140.15.15/dns-query

# ═══════════════════════════════════════════════════════════════
# VPN серверы — импорт из отдельного файла vpn.yaml
# Положите vpn.yaml рядом с config.yaml
# ═══════════════════════════════════════════════════════════════
proxies: []

proxy-providers:
  vpn-servers:
    type: file
    path: ./vpn.yaml
    health-check:
      enable: true
      url: https://cp.cloudflare.com/generate_204
      interval: 300

# ═══════════════════════════════════════════════════════════════
# Proxy Groups — селекторы в UI приложений
# ═══════════════════════════════════════════════════════════════
proxy-groups:
  # Главный переключатель для заблокированных сайтов
  - name: 🚫 Заблокированные сайты
    icon: https://raw.githubusercontent.com/remnawave/templates/refs/heads/main/icons/Blocked.png
    type: select
    use: [vpn-servers]
    filter: "^(?!.*Сбер).*$"
    proxies:
      - ⚡ Fastest

  # YouTube — Сбер по умолчанию (низкий пинг, нет рекламы)
  - name: ▶️ YouTube
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/YouTube.png
    type: select
    use: [vpn-servers]
    proxies:
      - 🚫 Заблокированные сайты
      - DIRECT

  # Discord — Сбер по умолчанию
  - name: 💬 Discord
    icon: https://raw.githubusercontent.com/remnawave/templates/refs/heads/main/icons/Discord.png
    type: select
    use: [vpn-servers]
    proxies:
      - 🚫 Заблокированные сайты
      - DIRECT

  # Telegram
  - name: ➤ Telegram
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Telegram.png
    type: select
    use: [vpn-servers]
    proxies:
      - 🚫 Заблокированные сайты
      - DIRECT

  # AI сервисы — только НЕ-RU серверы
  - name: 🤖 ChatGPT
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Bot.png
    type: select
    use: [vpn-servers]
    filter: "^(?!.*Сбер).*$"
    proxies:
      - 🚫 Заблокированные сайты

  - name: 🧠 Gemini
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Magic.png
    type: select
    use: [vpn-servers]
    filter: "^(?!.*Сбер).*$"
    proxies:
      - 🚫 Заблокированные сайты

  - name: 🔮 Anthropic
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Proxy.png
    type: select
    use: [vpn-servers]
    filter: "^(?!.*Сбер).*$"
    proxies:
      - 🚫 Заблокированные сайты

  # Соцсети — только НЕ-RU серверы (на Сбере не работают)
  - name: 📸 Instagram
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Instagram.png
    type: select
    use: [vpn-servers]
    filter: "^(?!.*Сбер).*$"
    proxies:
      - 🚫 Заблокированные сайты

  - name: 📘 Facebook
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Facebook.png
    type: select
    use: [vpn-servers]
    filter: "^(?!.*Сбер).*$"
    proxies:
      - 🚫 Заблокированные сайты

  - name: 🐦 Twitter
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Twitter.png
    type: select
    use: [vpn-servers]
    filter: "^(?!.*Сбер).*$"
    proxies:
      - 🚫 Заблокированные сайты

  - name: 💬 WhatsApp
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/WhatsApp.png
    type: select
    use: [vpn-servers]
    filter: "^(?!.*Сбер).*$"
    proxies:
      - 🚫 Заблокированные сайты

  - name: 🎮 Roblox
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Game.png
    type: select
    use: [vpn-servers]
    filter: "^(?!.*Сбер).*$"
    proxies:
      - 🚫 Заблокированные сайты
      - DIRECT

  # Cloudflare — DIRECT по умолчанию
  - name: 🟠 Cloudflare
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Cloudflare.png
    type: select
    use: [vpn-servers]
    proxies:
      - DIRECT
      - 🚫 Заблокированные сайты

  # Мои правила (my-rules.yaml) — все кроме RU серверов
  - name: 📋 Мои правила
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Bookmark.png
    type: select
    use: [vpn-servers]
    filter: "^(?!.*Сбер).*$"
    proxies:
      - 🚫 Заблокированные сайты

  # RU сайты — всегда DIRECT
  - name: ⚪🔵🔴 RU сайты
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Russia.png
    type: select
    proxies:
      - DIRECT

  # Остальное — DIRECT по умолчанию
  - name: 🌍 Остальные сайты
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Global.png
    type: select
    use: [vpn-servers]
    proxies:
      - DIRECT
      - 🚫 Заблокированные сайты

  # --- Скрытые служебные группы ---

  # Автовыбор самого быстрого (без Сбера)
  - name: ⚡ Fastest
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Auto.png
    type: url-test
    hidden: true
    tolerance: 150
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    use: [vpn-servers]
    filter: "^(?!.*Сбер).*$"

  # Фаллбек (без Сбера) — переключится на следующий если текущий упал
  - name: 📊 Fallback
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Magic.png
    type: fallback
    hidden: true
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    use: [vpn-servers]
    filter: "^(?!.*Сбер).*$"

  # Для совместимости (PROXY → через VPN)
  - name: PROXY
    type: select
    hidden: true
    proxies:
      - 🚫 Заблокированные сайты

