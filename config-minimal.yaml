# ═══════════════════════════════════════════════════════════════
# mihomo config-minimal by chm0d777
# Основа: legiz (проверенный) + proxy-providers + AI/соцсети
# GitHub: https://github.com/chm0d777/mihomo-config
# ═══════════════════════════════════════════════════════════════

mode: rule
log-level: info
mixed-port: 7890
allow-lan: false
tcp-concurrent: true
enable-process: true
find-process-mode: always
unified-delay: true
ipv6: false

profile:
  store-selected: true
  store-fake-ip: true

# Sniffer — как в legiz (без TUN, чтобы не было loopback)
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]

# DNS — как в legiz (redir-host, Yandex DoT для резолвинга)
dns:
  enable: true
  prefer-h3: true
  use-hosts: true
  use-system-hosts: true
  listen: 127.0.0.1:6868
  ipv6: false
  enhanced-mode: redir-host
  default-nameserver:
    - tls://77.88.8.8#DIRECT
    - 195.208.4.1#DIRECT
    - system
  proxy-server-nameserver:
    - tls://77.88.8.8#DIRECT
    - 195.208.4.1#DIRECT
    - system
  direct-nameserver:
    - tls://77.88.8.8#DIRECT
    - 195.208.4.1#DIRECT
    - system
  nameserver:
    - https://cloudflare-dns.com/dns-query#PROXY

# ═══════════════════════════════════════════════════════════════
# VPN серверы — импорт из vpn.yaml (не публикуется на GitHub)
# ═══════════════════════════════════════════════════════════════
proxies: []

proxy-providers:
  vpn-servers:
    type: file
    path: ./vpn.yaml
    health-check:
      enable: true
      url: https://cp.cloudflare.com/generate_204
      interval: 300

# ═══════════════════════════════════════════════════════════════
# Proxy Groups
# ═══════════════════════════════════════════════════════════════
proxy-groups:
  # Главный — все серверы
  - name: 🌍 VPN
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Hijacking.png
    type: select
    use: [vpn-servers]
    proxies:
      - ⚡ Fastest
      - DIRECT

  # YouTube — можно поставить Сбер (низкий пинг)
  - name: ▶️ YouTube
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/YouTube.png
    type: select
    use: [vpn-servers]
    proxies:
      - 🌍 VPN
      - DIRECT

  # Discord — можно поставить Сбер
  - name: 💬 Discord
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Discord.png
    type: select
    use: [vpn-servers]
    proxies:
      - 🌍 VPN
      - DIRECT

  # Telegram
  - name: ➤ Telegram
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Telegram.png
    type: select
    use: [vpn-servers]
    proxies:
      - 🌍 VPN
      - DIRECT

  # AI — только НЕ-RU серверы (Сбер не работает с ChatGPT/Claude)
  - name: 🤖 AI
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Bot.png
    type: select
    use: [vpn-servers]
    filter: "^(?!.*Сбер).*$"
    proxies:
      - ⚡ Fastest
      - 🌍 VPN

  # Соцсети (Instagram, Facebook, Twitter) — только НЕ-RU серверы
  - name: 📱 Соцсети
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Social.png
    type: select
    use: [vpn-servers]
    filter: "^(?!.*Сбер).*$"
    proxies:
      - ⚡ Fastest
      - 🌍 VPN

  # WhatsApp
  - name: ➤ WhatsApp
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Facebook.png
    type: select
    use: [vpn-servers]
    proxies:
      - 🌍 VPN
      - DIRECT

  # Автовыбор самого быстрого сервера
  - name: ⚡ Fastest
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Auto.png
    type: url-test
    hidden: true
    tolerance: 150
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    use: [vpn-servers]

  # Совместимость
  - name: PROXY
    type: select
    hidden: true
    proxies:
      - 🌍 VPN

