# ═══════════════════════════════════════════════════════════════
# Rules — порядок важен!
# ═══════════════════════════════════════════════════════════════
rules:
  # IP-чекеры и cloudflare DNS → через VPN (чтобы показывал VPN-IP)
  - OR,((DOMAIN,ipwhois.app),(DOMAIN,ipwho.is),(DOMAIN,api.ip.sb),(DOMAIN,ipapi.co),(DOMAIN,ipinfo.io),(DOMAIN,ip-api.com),(DOMAIN,cloudflare-dns.com),(DOMAIN,2ip.io)),🌍 VPN

  # Блокировка рекламы
  - RULE-SET,oisd_big,REJECT

  # Торренты → DIRECT
  - OR,((RULE-SET,torrent-clients),(RULE-SET,torrent-trackers)),DIRECT

  # YouTube
  - RULE-SET,youtube,▶️ YouTube

  # Telegram
  - OR,((RULE-SET,telegram-ips),(RULE-SET,telegram-domains)),➤ Telegram

  # Discord
  - OR,((RULE-SET,discord_domains),(RULE-SET,discord_voiceips)),💬 Discord

  # AI сервисы (только НЕ-RU через группу 🤖 AI)
  - RULE-SET,geosite-openai,🤖 AI
  - RULE-SET,google-gemini,🤖 AI
  - RULE-SET,geosite-anthropic,🤖 AI
  - RULE-SET,ai,🤖 AI

  # Соцсети (только НЕ-RU через группу 📱 Соцсети)
  - OR,((RULE-SET,geosite-instagram),(RULE-SET,geosite-facebook),(RULE-SET,facebook-ips)),📱 Соцсети
  - RULE-SET,geosite-twitter,📱 Соцсети

  # WhatsApp
  - RULE-SET,whatsapp-domains,➤ WhatsApp

  # Мои правила
  - RULE-SET,my-rules,🌍 VPN

  # Заблокированные сайты РФ
  - RULE-SET,ru-bundle,🌍 VPN
  - RULE-SET,refilter_domains,🌍 VPN
  - RULE-SET,refilter_ipsum,🌍 VPN

  # Всё остальное → DIRECT (как у legiz)
  - MATCH,DIRECT
