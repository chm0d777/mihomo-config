mode: rule
ipv6: false
log-level: info
allow-lan: false
unified-delay: true
tcp-concurrent: true

# external-controller: 127.0.0.1:9090
# external-ui: ./ui
# external-ui-url: "https://github.com/Zephyruso/zashboard/releases/latest/download/dist-cdn-fonts.zip"

# mixed-port: 7890
# tproxy-port: 7894
# routing-mark: 2

keep-alive-idle: 15
keep-alive-interval: 15

profile:
  store-selected: true
  tracing: false

dns:
  enable: true
  listen: 127.0.0.1:7874
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.0/15
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "+.msftconnecttest.com"
    - "+.3gppnetwork"
    - "Mijia Cloud"
  default-nameserver:
    - 8.8.8.8
    - 1.1.1.1
  nameserver:
    - https://8.8.8.8/dns-query
    - https://cloudflare-dns.com/dns-query
  nameserver-policy:
    "geosite:ru":
      - 77.88.8.8
      - 8.8.8.8

sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.lan"
    - "+.local"
    - "+.push.apple.com"
    - "+.apple.com"
    - "+.msftconnecttest.com"
    - "+.3gppnetwork"
  skip-dst-address:
    - 5.28.192.0/18
    - 91.105.192.0/23
    - 91.108.4.0/22
    - 91.108.8.0/21
    - 91.108.16.0/21
    - 91.108.56.0/22
    - 95.161.64.0/20
    - 109.239.140.0/24
    - 149.154.160.0/20
    - 185.76.151.0/24

proxies:

  
proxy-groups:
  - name: Proxy
    type: select
    proxies:
      - Нидерланды
      - Сбер
      - DIRECT

  - name: YouTube
    type: select
    proxies:
      - Сбер        # по умолчанию Сбер
      - Нидерланды
      - DIRECT

  - name: Discord
    type: select
    proxies:
      - Сбер        # по умолчанию Сбер
      - Нидерланды
      - DIRECT

  - name: Telegram
    type: select
    proxies:
      - Нидерланды
      - Сбер
      - DIRECT

  - name: ChatGPT
    type: select
    proxies:
      - Нидерланды
      - Сбер
      - DIRECT

  - name: Gemini
    type: select
    proxies:
      - Нидерланды
      - Сбер
      - DIRECT

  - name: Anthropic
    type: select
    proxies:
      - Нидерланды
      - Сбер
      - DIRECT

  - name: Instagram
    type: select
    proxies:
      - Нидерланды
      - Сбер
      - DIRECT

  - name: Facebook
    type: select
    proxies:
      - Нидерланды
      - Сбер
      - DIRECT

  - name: Twitter
    type: select
    proxies:
      - Нидерланды
      - Сбер
      - DIRECT

