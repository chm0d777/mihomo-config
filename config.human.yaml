rules:
  - IP-CIDR,127.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
  - IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,172.16.0.0/12,DIRECT,no-resolve

  - DOMAIN-SUFFIX,ru,DIRECT
  - DOMAIN-SUFFIX,рф,DIRECT
  - DOMAIN-SUFFIX,su,DIRECT

  # Заблокированные — VPN
  # YouTube и Discord закомментированы — zapret справляется
  - RULE-SET,ru-blocked,Proxy
  - RULE-SET,telegram,Telegram
  - RULE-SET,geosite-youtube,YouTube
  - RULE-SET,geosite-discord,Discord
  - RULE-SET,geosite-instagram,Instagram
  - RULE-SET,geosite-openai,ChatGPT
